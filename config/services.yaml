parameters:
    auth_service_url: '%env(AUTH_SERVICE_URL)%'
    public_route_prefixes: ['/metrics', '/api/doc', '/health']
    protected_get_routes: ['/api/v1/products']

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DataFixtures/'
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    App\Controller\:
        resource: '../src/Controller/'
        tags: ['controller.service_arguments']

    App\Service\SearchService:
        arguments:
            $productsFinder: '@fos_elastica.finder.products'

    App\CircuitBreaker\CircuitBreakerFactory:
        arguments:
            $redisHost: '%env(REDIS_HOST)%'
            $redisPort: '%env(int:REDIS_PORT)%'
            $redisPassword: '%env(REDIS_PASSWORD)%'

    App\Client\AuthServiceClient:
        arguments:
            $authServiceUrl: '%auth_service_url%'

    App\EventListener\AuthTokenListener:
        arguments:
            $publicPrefixes: '%public_route_prefixes%'
            $protectedGetRoutes: '%protected_get_routes%'
        tags:
            - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest, priority: 10 }

    App\RateLimit\RateLimitService:
        arguments:
            $redisHost: '%env(REDIS_HOST)%'
            $redisPort: '%env(int:REDIS_PORT)%'
            $redisPassword: '%env(REDIS_PASSWORD)%'
            $maxTokens: 100
            $windowSeconds: 60

    App\EventListener\UserRateLimitListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest, priority: 8 }

    App\EventListener\RateLimitHeaderListener:
        tags:
            - { name: kernel.event_listener, event: kernel.response, method: onKernelResponse }

    App\EventListener\ExceptionListener:
        tags:
            - { name: kernel.event_listener, event: kernel.exception, priority: 100 }

    App\EventListener\ProductIndexListener:
        tags:
            - { name: doctrine.event_listener, event: postPersist }
            - { name: doctrine.event_listener, event: postUpdate }
            - { name: doctrine.event_listener, event: preRemove }

    App\Contract\ProductServiceInterface:
        class: App\Service\ProductService

    App\Contract\CategoryServiceInterface:
        class: App\Service\CategoryService

    App\Contract\SearchServiceInterface:
        alias: App\Service\SearchService

    App\Contract\AuthTokenValidatorInterface:
        alias: App\Client\AuthServiceClient

    App\Contract\MetricsRegistryInterface:
        class: App\Metrics\PrometheusMetricsRegistry

    App\EventListener\HttpMetricsListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest }
            - { name: kernel.event_listener, event: kernel.terminate, method: onKernelTerminate }

    App\EventListener\ProductMetricsListener:
        tags:
            - { name: kernel.event_listener, event: kernel.terminate, method: onKernelTerminate }

    App\Service\HealthCheckService:
        arguments:
            $redisUrl: '%env(REDIS_URL)%'
            $elasticsearchHost: '%env(ELASTICSEARCH_HOST)%'
            $kafkaBroker: '%env(KAFKA_BROKER)%'

    App\Tracing\TracingService:
        arguments:
            $jaegerEndpoint: '%env(JAEGER_ENDPOINT)%'
            $serviceName: '%env(SERVICE_NAME)%'

    App\EventListener\TracingListener:
        tags:
            - { name: kernel.event_listener, event: kernel.request, method: onKernelRequest, priority: 100 }

    App\EventListener\TracingFinishListener:
        tags:
            - { name: kernel.event_listener, event: kernel.terminate, method: onKernelTerminate }

    App\EventListener\TracingResponseListener:
        tags:
            - { name: kernel.event_listener, event: kernel.response, method: onKernelResponse }

    App\Logger\TraceContextProcessor:
        tags:
            - { name: monolog.processor }

    App\Logger\ServiceNameProcessor:
        tags:
            - { name: monolog.processor }
