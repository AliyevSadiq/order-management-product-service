version: '3.8'

services:
  product-service:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - /app/vendor
    ports:
      - "${APP_PORT}:8080"
    environment:
      APP_ENV: ${APP_ENV}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ELASTICSEARCH_HOST: ${ELASTICSEARCH_HOST}
      KAFKA_BROKER: ${KAFKA_BROKER}
      KAFKA_DSN: ${KAFKA_DSN}
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      JAEGER_ENDPOINT: ${JAEGER_ENDPOINT:-http://jaeger:9411/api/v2/spans}
      SERVICE_NAME: ${SERVICE_NAME:-product-service}
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      product-elasticsearch:
        condition: service_healthy
    networks:
      - product-network
      - infra-network
    restart: unless-stopped

  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    networks:
      - product-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT_EXTERNAL}:6379"
    networks:
      - product-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  product-elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "${ELASTICSEARCH_PORT}:9200"
    networks:
      - product-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: product-postgres-exporter
    environment:
      DATA_SOURCE_NAME: ${POSTGRES_EXPORTER_DSN}
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - "${POSTGRES_EXPORTER_PORT}:9187"
    networks:
      - product-network
      - infra-network
    restart: unless-stopped

networks:
  product-network:
    driver: bridge
  infra-network:
    external: true
    name: infra-network

volumes:
  postgres-data:
  redis-data:
  elasticsearch-data:
